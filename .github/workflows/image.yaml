name: Publish marketing image

# Build the in cluster static marketing image and push it to GHCR, so the
# single origin mitos.run deploy (paperclipinc/mono gitops) can serve marketing
# from a Service instead of an external host. The mono `marketing.image`
# references ghcr.io/mitos-run/mitos-marketing.
on:
  push:
    branches: [main]
    tags: ['v*']

# GITHUB_TOKEN needs packages:write to push to GHCR.
permissions:
  contents: read
  packages: write

concurrency:
  group: marketing-image-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/mitos-run/mitos-marketing

jobs:
  image:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        # NOTE: the first push creates the package as private. Make it public
        # once under Packages -> mitos-marketing -> visibility, like the other
        # mitos-run packages, so the cluster can pull without a pull secret.
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          # sha-<short> on every build, latest on main, and the git tag on a
          # v* tag push.
          tags: |
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
