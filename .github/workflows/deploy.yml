name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    # Daily rebuild so the baked-in GitHub star count stays fresh between pushes.
    - cron: '0 6 * * *'
  workflow_dispatch:

# Allow the workflow to publish to Pages via OIDC.
permissions:
  contents: read
  pages: write
  id-token: write

# One concurrent Pages deploy; do not cancel an in-progress publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build Astro site (installs deps, runs astro build, uploads the Pages artifact)
        uses: withastro/action@v3
        with:
          # astro@6 requires Node >=22.12; the action defaults to Node 20.
          node-version: 22
        env:
          # Authenticated star fetch (lib/stars.ts) so the baked count is reliable, not rate-limited.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
