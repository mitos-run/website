name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    # Daily rebuild so the baked-in GitHub star count stays fresh between pushes.
    - cron: '0 6 * * *'
  workflow_dispatch:

# Allow the workflow to publish to Pages via OIDC.
permissions:
  contents: read
  pages: write
  id-token: write

# One concurrent Pages deploy; do not cancel an in-progress publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # astro@6 requires Node >=22.12.
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build
        # `npm run build` = astro build + scripts/postbuild-clean-urls.mjs, which
        # rewrites Starlight's .html links/canonicals to clean URLs. The withastro
        # action runs `astro build` directly and would skip that step, so we build
        # manually and upload the Pages artifact ourselves.
        run: npm run build
        env:
          # Authenticated star fetch (lib/stars.ts) so the baked count is reliable, not rate-limited.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: npm test
      - run: npm run check:docs
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
