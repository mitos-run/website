# Static server config for the mitos marketing image. Dropped in at
# /etc/nginx/conf.d/default.conf, replacing the stock server block. The base
# image (nginxinc/nginx-unprivileged) listens on 8080 as uid 101 and already
# includes mime.types in the http block, so content types are correct.

server {
    listen      8080;
    listen      [::]:8080;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    # Default: revalidate HTML and anything not matched below on every request,
    # so a fresh deploy is picked up immediately. add_header in a location
    # replaces this, which is how the immutable asset rules below take over.
    add_header Cache-Control "no-cache" always;

    # Clean, slash free URLs: serve /about from about.html, /blog/x from
    # blog/x.html, etc. Mirrors how the site is built (build.format: 'file')
    # and linked (scripts/postbuild-clean-urls.mjs).
    location / {
        try_files $uri $uri.html $uri/index.html =404;
    }

    # Go vanity import meta. `go get mitos.run/mitos/...` must receive the meta
    # page with a 200 at every import depth, so rewrite the whole tree to it.
    location = /mitos {
        try_files /mitos/index.html =404;
    }
    location /mitos/ {
        try_files /mitos/index.html =404;
    }

    # Fingerprinted build assets are content hashed, so cache them forever.
    location /_astro/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # Self hosted fonts are stable; cache them hard too.
    location /fonts/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    error_page 404 /404.html;
    location = /404.html {
        internal;
    }
}
